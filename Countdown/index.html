    <header>
    <body>
            <h1> How Many Days Until Graduation? (Class of 2023) </h1>
            <h2 id="days"></h2>
            <h3 id="hours"></h3>
            <h4 id="mins"><h4>
            <h5 id="secs"></h5>
            <h6 id="days1"></h6>
            <script>
            var date1 = new Date("Nov 17, 2023 15:00:00").getTime();
            //insert end date number here
        
            var myfunc = setInterval(function() {
        
            var now = new Date().getTime();
            var timeleft = date1 - now;
                
            var days = Math.floor(timeleft / (1000 * 60 * 60 * 24));
            var hours = Math.floor((timeleft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((timeleft % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((timeleft % (1000 * 60)) / 1000);
                
            document.getElementById("days").innerHTML = days + " Days"
            document.getElementById("hours").innerHTML = hours + " Hours" 
            document.getElementById("mins").innerHTML = minutes + " Minutes" 
            document.getElementById("secs").innerHTML = seconds + " Seconds" 
                
            if (timeleft < 0) {
                clearInterval(myfunc);
                document.getElementById("days").innerHTML = ""
                document.getElementById("hours").innerHTML = "" 
                document.getElementById("mins").innerHTML = ""
                document.getElementById("secs").innerHTML = ""
            }
            }, 1000);

            var date2 = new Date("Jan 27, 2010 09:00:00").getTime();
            // insert start date number here
        
        var myfunc1 = setInterval(function() {
    
        var now1 = new Date().getTime();
        var timeleft1 = now1 - date2;
            
        var days1 = Math.floor(timeleft1 / (1000 * 60 * 60 * 24));

        //calculating the difference from start to finish
        var Difference = date1 - date2;

        //Calculate number of days
        var DiffDays = Math.floor(Difference / (1000 * 60 * 60 * 24)); 
        var percent1 = (days1/DiffDays)*100;
        //round percent
        var roundedpercent = percent1.toFixed(3)
            
        document.getElementById("days1").innerHTML = "You've already had around " +  days1 + " days of school, so you are about " + roundedpercent + "% of the way there!";

            
        if (timeleft < 0) {
            clearInterval(myfunc);
            document.getElementById("days1").innerHTML = ""
            document.getElementById("hours1").innerHTML = "" 
            document.getElementById("mins1").innerHTML = ""
            document.getElementById("secs1").innerHTML = ""
        }
        }, 1000);
            </script>

        <div class="bottom-stuff">
            <!--Info Abt Site-->
            <a>Somewhat Accurate (Results will be different if you started school overseas or skipped/repeated a year)</a>
        </div>
    </body>
